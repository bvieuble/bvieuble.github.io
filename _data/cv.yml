            #- Sub-description 2.
    - title: Internship
      institution: AMSS (Academy of Sciences), Beijing, China
      year: 2019
      description:
        - Deep learning approaches to determine the dominant eigenvalues. Study of the sparse matrix case using graph neural network approaches with TensorFlow.
        - 'Advisor: Pr. Liu Xin.'

    - title: Group project
      institution: ENSEEIHT, Toulouse, France
      year: 2019
      description:
        - Supervised postgraduate group project. Use of convolutional neural networks to estimate the nearshore bathymetry through wave motions. This work contributed to a journal article.
        - 'Advisor: Ehouarn Simon.'

    - title: Gap year
      institution: IPAL-CNRS, Singapore
      year: 2017 - 2018
      description:
        - 'Position tracking of fingers on a large 2D surface. Part of a project willing to make wearable technology to help visually impaired people to interact with maps. Different technologies were used: Inertial Measurement Unit (IMU), color tracking, Leap Motion, and the creation of a dot patterns based finger tracker inspired by the Anoto technology.'
        - 'Advisor: Christophe Jouffrais.'

