    - title: Ph.D.
      institution: INPT-IRIT, Toulouse, France
      year: 2019 - 2022
      description:
        - 'Title: <em>"Mixed precision iterative refinement for the solution of large sparse linear systems"</em>.' 
        - title: 'My Ph.D. thesis research includes the following:'
          contents:
            - Improvement of direct and iterative solvers for the solution of linear systems with approximate computing techniques.
            - Rounding error analysis of mixed precision algorithms.
