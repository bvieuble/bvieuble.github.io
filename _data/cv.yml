- title: Research experiences
  type: time_table
  contents:
    - title: Research Associate
      institution: The University of Manchester, Manchester, UK
      year: 2022 - now
      description:
        - Member of the Numerical Linear Algebra group working with Pr. Nicholas J. Higham. My research topics cover sparse direct and iterative solvers, high performance computing, rounding error analysis, mixed precision, and approximate computing.
        #- Description 2.
